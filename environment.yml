# Conda environment for the milestone-oracle-diagnostic release.
#
#   conda env create -f environment.yml
#   conda activate milestone-oracle
#
# The verifier requires Python 3.10+ (dataclass(slots=...)).

name: milestone-oracle
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.11
  - pip
  - sympy>=1.12
  - numpy>=1.24
  - pandas>=2.0
  - pyyaml>=6.0
  - matplotlib>=3.7
  - pip:
    - mlcroissant>=1.0
    - math-verify>=0.5
    - pydantic>=2.0
    - openai>=1.0
